<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NullRecords — Contacts Report</title>
<style>
:root {
  --bg: #0a0a0f; --surface: #14141f; --border: #2a2a3a;
  --text: #e0e0e8; --muted: #8888aa; --accent: #6c5ce7;
  --green: #2ecc71; --yellow: #f39c12; --red: #e74c3c;
  --blue: #3498db; --orange: #e67e22; --pink: #e84393;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

/* Header */
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .nav-links { margin-left: auto; display: flex; gap: 12px; }
.header .nav-links a { color: var(--accent); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; background: rgba(108,92,231,0.1); }
.header .nav-links a:hover { background: rgba(108,92,231,0.2); }

/* Layout */
.container { max-width: 1600px; margin: 0 auto; padding: 20px; }

/* Summary Cards */
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.summary-card .num { font-size: 28px; font-weight: 700; }
.summary-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.num.green { color: var(--green); } .num.yellow { color: var(--yellow); }
.num.red { color: var(--red); } .num.blue { color: var(--blue); }
.num.accent { color: var(--accent); }

/* Filters */
.filters { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
.filter-group select, .filter-group input { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 13px; }

/* Action bar */
.action-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #5a4bd6; }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #27ae60; }
.btn-blue { background: var(--blue); color: #fff; }
.btn-blue:hover { background: #2980b9; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-orange:hover { background: #d35400; }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); color: var(--accent); }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
th { background: #1a1a2e; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); text-align: left; position: sticky; top: 0; cursor: pointer; white-space: nowrap; }
th:hover { color: var(--text); }
td { padding: 10px 12px; border-top: 1px solid var(--border); font-size: 13px; vertical-align: top; }
tr:hover { background: rgba(108,92,231,0.05); }
tr.selected { background: rgba(108,92,231,0.12); }

/* Badges */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-green { background: rgba(46,204,113,0.15); color: var(--green); }
.badge-yellow { background: rgba(243,156,18,0.15); color: var(--yellow); }
.badge-red { background: rgba(231,76,60,0.15); color: var(--red); }
.badge-blue { background: rgba(52,152,219,0.15); color: var(--blue); }
.badge-purple { background: rgba(108,92,231,0.15); color: var(--accent); }
.badge-muted { background: rgba(136,136,170,0.15); color: var(--muted); }

/* Contact method */
.contact-detail { max-width: 250px; word-break: break-all; }
.contact-detail a { color: var(--blue); text-decoration: none; }
.contact-detail a:hover { text-decoration: underline; }

/* Score bar */
.score-bar { width: 60px; height: 6px; background: var(--border); border-radius: 3px; display: inline-block; vertical-align: middle; margin-right: 4px; }
.score-bar-fill { height: 100%; border-radius: 3px; }

/* Status indicator */
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
.status-dot.green { background: var(--green); }
.status-dot.yellow { background: var(--yellow); }
.status-dot.red { background: var(--red); }
.status-dot.muted { background: var(--muted); }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 600px; width: 95%; max-height: 80vh; overflow-y: auto; padding: 24px; }
.modal h3 { margin-bottom: 16px; }
.modal .field { margin-bottom: 12px; }
.modal .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
.modal .field .val { font-size: 14px; }
.modal .field a { color: var(--blue); text-decoration: none; }
.modal .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--muted); }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 2000; display: none; }
.toast.error { background: var(--red); }

/* Pagination */
.pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; color: var(--muted); font-size: 13px; }
.pagination button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 14px; border-radius: 6px; cursor: pointer; }
.pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 Contacts Report</h1>
  <div class="nav-links">
    <a href="/admin">⬅ Dashboard</a>
    <a href="/admin/news">📰 News</a>
    <a href="/scheduler/status" target="_blank">⏱ Scheduler</a>
  </div>
</div>

<div class="container">
  <!-- Summary -->
  <div class="summary-grid" id="summary-grid">
    <div class="summary-card"><div class="num accent" id="s-total">—</div><div class="label">Total Contacts</div></div>
    <div class="summary-card"><div class="num green" id="s-email">—</div><div class="label">Have Email</div></div>
    <div class="summary-card"><div class="num blue" id="s-social">—</div><div class="label">Have Social DM</div></div>
    <div class="summary-card"><div class="num green" id="s-sendable">—</div><div class="label">Can Send To</div></div>
    <div class="summary-card"><div class="num red" id="s-needs">—</div><div class="label">Needs Research</div></div>
    <div class="summary-card"><div class="num yellow" id="s-not-contacted">—</div><div class="label">Not Yet Contacted</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <label>Type</label>
      <select id="f-type"><option value="">All</option><option value="playlist">Playlists</option><option value="influencer">Influencers</option></select>
    </div>
    <div class="filter-group">
      <label>Platform</label>
      <select id="f-platform"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Has Email</label>
      <select id="f-email"><option value="">Any</option><option value="true">Yes</option><option value="false">No</option></select>
    </div>
    <div class="filter-group">
      <label>Has Social DM</label>
      <select id="f-social"><option value="">Any</option><option value="true">Yes</option><option value="false">No</option></select>
    </div>
    <div class="filter-group">
      <label>Contact Method</label>
      <select id="f-method"><option value="">All</option><option value="email">Email</option><option value="instagram">Instagram</option><option value="twitter">Twitter</option><option value="discord">Discord</option><option value="reddit_modmail">Reddit Modmail</option><option value="youtube_url">YouTube URL</option><option value="url">URL Only</option><option value="none">None</option></select>
    </div>
    <div class="filter-group">
      <label>Can Send</label>
      <select id="f-send"><option value="">Any</option><option value="true">Yes</option><option value="false">No — Needs Research</option></select>
    </div>
    <div class="filter-group">
      <label>Outreach Status</label>
      <select id="f-outreach"><option value="">Any</option><option value="not_contacted">Not Contacted</option><option value="sent">Sent</option><option value="delivered">Delivered</option><option value="opened">Opened</option><option value="logged">Logged</option></select>
    </div>
    <div class="filter-group">
      <label>Min Score</label>
      <input type="number" id="f-score" min="0" max="1" step="0.1" value="0" style="width:70px">
    </div>
    <div class="filter-group">
      <label>Sort By</label>
      <select id="f-sort"><option value="score">Relevance Score</option><option value="name">Name</option><option value="platform">Platform</option><option value="contacted">Last Contacted</option></select>
    </div>
    <div class="filter-group" style="margin-top: 12px;">
      <button class="btn btn-primary" onclick="loadContacts()">Apply Filters</button>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-bar">
    <button class="btn btn-green" onclick="exportCSV()">📥 Export CSV (for Intern)</button>
    <button class="btn btn-blue" onclick="exportJSON()">📥 Export JSON</button>
    <button class="btn btn-orange" onclick="enrichAll()">🔍 Research All Missing Contacts</button>
    <button class="btn btn-primary" onclick="batchSendSelected()">✉️ Send to Selected</button>
    <span id="selected-count" style="color:var(--muted); font-size:13px; align-self:center;"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"></th>
          <th onclick="sortBy('name')">Name</th>
          <th onclick="sortBy('type')">Type</th>
          <th onclick="sortBy('platform')">Platform</th>
          <th>Contact Method</th>
          <th>Contact Value</th>
          <th>Send?</th>
          <th onclick="sortBy('score')">Score</th>
          <th>Followers</th>
          <th>Outreach</th>
          <th>Messages</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="contacts-body">
        <tr><td colspan="12" class="loading"><div class="spinner"></div> Loading contacts...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <span id="page-info"></span>
    <div>
      <button id="prev-btn" onclick="prevPage()" disabled>← Prev</button>
      <button id="next-btn" onclick="nextPage()">Next →</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" id="modal-content"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '/admin/api';
let currentData = [];
let currentPage = 0;
const PAGE_SIZE = 50;

function toast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

function getFilters() {
  return {
    contact_type: document.getElementById('f-type').value,
    platform: document.getElementById('f-platform').value,
    has_email: document.getElementById('f-email').value,
    has_social: document.getElementById('f-social').value,
    contact_method: document.getElementById('f-method').value,
    can_send: document.getElementById('f-send').value,
    outreach_status: document.getElementById('f-outreach').value,
    min_score: parseFloat(document.getElementById('f-score').value) || 0,
    sort: document.getElementById('f-sort').value,
  };
}

function buildQuery(filters) {
  const params = new URLSearchParams();
  for (const [k, v] of Object.entries(filters)) {
    if (v !== '' && v !== 0) params.set(k, v);
  }
  return params.toString();
}

async function loadContacts() {
  const filters = getFilters();
  const q = buildQuery(filters);
  try {
    const r = await fetch(`${API}/contacts?${q}&limit=10000`);
    const data = await r.json();
    currentData = data.items;
    currentPage = 0;

    // Update summary
    document.getElementById('s-total').textContent = data.total;
    document.getElementById('s-email').textContent = data.summary.with_email;
    document.getElementById('s-social').textContent = data.summary.with_social;
    document.getElementById('s-sendable').textContent = data.summary.can_send;
    document.getElementById('s-needs').textContent = data.summary.needs_research;
    document.getElementById('s-not-contacted').textContent = data.summary.not_yet_contacted;

    // Populate platform filter if not done
    const psel = document.getElementById('f-platform');
    if (psel.options.length <= 1 && data.summary.by_platform) {
      for (const [p, c] of Object.entries(data.summary.by_platform).sort((a, b) => b[1] - a[1])) {
        const o = document.createElement('option');
        o.value = p;
        o.textContent = `${p} (${c})`;
        psel.appendChild(o);
      }
    }

    renderPage();
  } catch (e) {
    toast('Failed to load contacts: ' + e.message, true);
  }
}

function renderPage() {
  const start = currentPage * PAGE_SIZE;
  const page = currentData.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('contacts-body');

  if (page.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--muted);padding:40px;">No contacts match your filters</td></tr>';
    return;
  }

  tbody.innerHTML = page.map((c, i) => {
    const idx = start + i;
    const scoreColor = c.relevance_score >= 0.8 ? 'var(--green)' : c.relevance_score >= 0.6 ? 'var(--yellow)' : 'var(--red)';
    const scoreWidth = Math.round(c.relevance_score * 100);

    const contactBadge = c.contact_method === 'email' ? '<span class="badge badge-green">📧 Email</span>'
      : c.contact_method === 'instagram' ? '<span class="badge badge-purple">📷 Instagram</span>'
      : c.contact_method === 'twitter' ? '<span class="badge badge-blue">🐦 Twitter</span>'
      : c.contact_method === 'discord' ? '<span class="badge badge-purple">💬 Discord</span>'
      : c.contact_method === 'reddit_modmail' ? '<span class="badge badge-yellow">📮 Reddit</span>'
      : c.contact_method === 'tiktok' ? '<span class="badge badge-purple">🎵 TikTok</span>'
      : c.contact_method === 'youtube_url' ? '<span class="badge badge-red">▶ YouTube</span>'
      : c.contact_method === 'url' ? '<span class="badge badge-muted">🔗 URL Only</span>'
      : '<span class="badge badge-red">❌ None</span>';

    const sendBadge = c.can_send
      ? '<span class="status-dot green"></span>Yes'
      : '<span class="status-dot red"></span>No';

    const outreachBadge = c.outreach_status === 'not_contacted' ? '<span class="badge badge-muted">Not Contacted</span>'
      : c.outreach_status === 'sent' ? '<span class="badge badge-blue">Sent</span>'
      : c.outreach_status === 'delivered' ? '<span class="badge badge-green">Delivered</span>'
      : c.outreach_status === 'opened' ? '<span class="badge badge-green">Opened ✓</span>'
      : c.outreach_status === 'clicked' ? '<span class="badge badge-green">Clicked ✓✓</span>'
      : c.outreach_status === 'logged' ? '<span class="badge badge-yellow">Logged</span>'
      : `<span class="badge badge-muted">${c.outreach_status}</span>`;

    const contactVal = c.contact_value
      ? (c.contact_value.startsWith('http')
        ? `<a href="${c.contact_value}" target="_blank">${c.contact_value.length > 40 ? c.contact_value.substring(0, 40) + '…' : c.contact_value}</a>`
        : c.contact_value)
      : '<span style="color:var(--muted)">—</span>';

    return `<tr class="${c._selected ? 'selected' : ''}">
      <td><input type="checkbox" data-idx="${idx}" onchange="toggleSelect(${idx}, this.checked)"></td>
      <td><a href="#" onclick="showDetail(${idx}); return false;" style="color:var(--accent); text-decoration:none; font-weight:500;">${esc(c.name)}</a></td>
      <td><span class="badge ${c.type === 'playlist' ? 'badge-blue' : 'badge-purple'}">${c.type}</span></td>
      <td>${c.platform}</td>
      <td>${contactBadge}</td>
      <td class="contact-detail">${contactVal}</td>
      <td>${sendBadge}</td>
      <td><span class="score-bar"><span class="score-bar-fill" style="width:${scoreWidth}%;background:${scoreColor}"></span></span> ${c.relevance_score.toFixed(1)}</td>
      <td>${c.followers ? c.followers.toLocaleString() : '—'}</td>
      <td>${outreachBadge}</td>
      <td>${c.messages_sent || 0}</td>
      <td style="white-space:nowrap">
        ${c.can_send ? `<button class="btn btn-sm btn-primary" onclick="sendTo(${idx})">Send</button>` : `<button class="btn btn-sm btn-orange" onclick="enrichOne(${idx})">Research</button>`}
        <button class="btn btn-sm btn-outline" onclick="showDetail(${idx})">Detail</button>
      </td>
    </tr>`;
  }).join('');

  // Pagination info
  document.getElementById('page-info').textContent = `Showing ${start + 1}–${Math.min(start + PAGE_SIZE, currentData.length)} of ${currentData.length}`;
  document.getElementById('prev-btn').disabled = currentPage === 0;
  document.getElementById('next-btn').disabled = start + PAGE_SIZE >= currentData.length;
  updateSelectedCount();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function nextPage() { currentPage++; renderPage(); window.scrollTo(0, 0); }
function prevPage() { currentPage--; renderPage(); window.scrollTo(0, 0); }

// --- Selection ---
function toggleSelectAll(cb) {
  currentData.forEach(c => c._selected = cb.checked);
  renderPage();
}
function toggleSelect(idx, checked) {
  currentData[idx]._selected = checked;
  updateSelectedCount();
}
function updateSelectedCount() {
  const count = currentData.filter(c => c._selected).length;
  document.getElementById('selected-count').textContent = count > 0 ? `${count} selected` : '';
}

// --- Detail Modal ---
function showDetail(idx) {
  const c = currentData[idx];
  const m = document.getElementById('modal-content');
  m.innerHTML = `
    <h3>${esc(c.name)}</h3>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="field"><label>Type</label><div class="val"><span class="badge ${c.type === 'playlist' ? 'badge-blue' : 'badge-purple'}">${c.type}</span></div></div>
      <div class="field"><label>Platform</label><div class="val">${c.platform}</div></div>
      <div class="field"><label>Curator</label><div class="val">${c.curator || '—'}</div></div>
      <div class="field"><label>Followers</label><div class="val">${c.followers ? c.followers.toLocaleString() : '—'}</div></div>
      <div class="field"><label>Relevance Score</label><div class="val">${c.relevance_score.toFixed(2)}</div></div>
      <div class="field"><label>Contact Method</label><div class="val">${c.contact_method}</div></div>
    </div>
    <div class="field" style="margin-top:12px"><label>Contact Value</label><div class="val">${c.contact_value ? (c.contact_value.startsWith('http') ? `<a href="${c.contact_value}" target="_blank">${c.contact_value}</a>` : c.contact_value) : '<span style="color:var(--muted)">None — needs research</span>'}</div></div>
    <div class="field"><label>Raw Contact</label><div class="val" style="word-break:break-all; font-size:12px; color:var(--muted);">${c.raw_contact || '—'}</div></div>
    ${c.url ? `<div class="field"><label>URL</label><div class="val"><a href="${c.url}" target="_blank">${c.url}</a></div></div>` : ''}
    ${c.niche ? `<div class="field"><label>Niche / Description</label><div class="val">${esc(c.niche)}</div></div>` : ''}
    <hr style="border-color:var(--border); margin: 16px 0;">
    <h4 style="margin-bottom:8px;">Outreach History</h4>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      <div class="field"><label>Status</label><div class="val">${c.outreach_status}</div></div>
      <div class="field"><label>Messages Sent</label><div class="val">${c.messages_sent}</div></div>
      <div class="field"><label>Last Outreach</label><div class="val">${c.last_outreach_date ? new Date(c.last_outreach_date).toLocaleDateString() : 'Never'}</div></div>
      <div class="field"><label>Follow-up Due</label><div class="val">${c.follow_up_due ? new Date(c.follow_up_due).toLocaleDateString() : '—'}</div></div>
    </div>
    <div style="display:flex; gap:8px; margin-top:16px;">
      ${c.can_send ? `<button class="btn btn-primary" onclick="sendTo(${idx}); closeModal();">✉️ Send Outreach</button>` : `<button class="btn btn-orange" onclick="enrichOne(${idx}); closeModal();">🔍 Research Contact</button>`}
      ${c.url ? `<a href="${c.url}" target="_blank" class="btn btn-outline">🔗 Visit Page</a>` : ''}
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>
  `;
  document.getElementById('detail-modal').classList.add('active');
}
function closeModal() { document.getElementById('detail-modal').classList.remove('active'); }
document.getElementById('detail-modal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });

// --- Actions ---
async function sendTo(idx) {
  const c = currentData[idx];
  if (!c.can_send) { toast('No actionable contact — research this contact first', true); return; }
  toast('Generating & sending outreach...');
  try {
    const r = await fetch('/outreach/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({target_type: c.type, target_id: c.id}),
    });
    const d = await r.json();
    if (r.ok) { toast(`Outreach ${d.status}: ${(d.subject || '').substring(0, 60)}`); loadContacts(); }
    else { toast(d.detail || 'Send failed', true); }
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function enrichOne(idx) {
  const c = currentData[idx];
  toast(`Researching ${c.name}...`);
  try {
    const r = await fetch('/outreach/enrich-contacts', {method: 'POST'});
    const d = await r.json();
    toast(`Enrichment complete: ${d.enriched || 0} contacts updated`);
    loadContacts();
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function enrichAll() {
  toast('Starting contact research for all targets...');
  try {
    const r = await fetch('/outreach/enrich-contacts', {method: 'POST'});
    const d = await r.json();
    toast(`Research complete: ${d.enriched || 0} contacts found/updated`);
    loadContacts();
  } catch (e) { toast('Error: ' + e.message, true); }
}

async function batchSendSelected() {
  const selected = currentData.filter(c => c._selected && c.can_send);
  if (selected.length === 0) { toast('Select contacts with email/social to send to', true); return; }
  if (!confirm(`Send outreach to ${selected.length} contacts?`)) return;

  toast(`Sending to ${selected.length} contacts...`);
  try {
    const targets = selected.map(c => ({target_type: c.type, target_id: c.id}));
    const r = await fetch('/outreach/batch-send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({targets}),
    });
    const d = await r.json();
    toast(`Batch complete: ${d.sent || 0} sent, ${d.logged || 0} logged`);
    loadContacts();
  } catch (e) { toast('Error: ' + e.message, true); }
}

function exportCSV() {
  const filters = getFilters();
  const q = buildQuery(filters);
  window.open(`${API}/contacts/export?format=csv&${q}`, '_blank');
}
function exportJSON() {
  const filters = getFilters();
  const q = buildQuery(filters);
  window.open(`${API}/contacts/export?format=json&${q}`, '_blank');
}

// Load on page load
loadContacts();
</script>
